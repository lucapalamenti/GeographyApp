<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Map</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="css/all.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/create.css" />

    <script src="js/create/create.js" type="module"></script>
    <script src="js/components/header.js"></script>
</head>
<body>
    <app-header></app-header>
    <main class="flex-col-center gap-5">
        <form id="create-form" class="flex-col gap-5 form-1">
            <h3>Create Custom Map</h3>
            <div class="input-label">
                <label for="map-name">Map Name</label>
                <input type="text" name="map-name" id="map-name" required>
            </div>
            <div class="input-label">
                <label for="select-template">Choose Template</label>
                <select name="select-template" id="select-template" required>
                    <option value="-1">Select</option>
                </select>
            </div>
            <div class="input-label">
                <label for="map-color">Select Icon Color</label>
                <input type="color" id="map-color">
            </div>
            <div class="input-label">
                <label for="map-thumbnail">Select a Thumbnail</label>
                <input type="file" name="thumbnail" accept="image/png,image/jpeg" id="map-thumbnail">
            </div>
            
            <nav class="flex-row gap-5">
                <button type="submit" id="create-button" class="btn-green">Create</button>
                <a href="../" class="btn-grey">Cancel</a>
            </nav>

            <aside id="state-buttons-panel" class="flex-col gap-5">
                <button type="button" id="deselect-btn" class="btn-icon"><aside>Deselect</aside></button>
                <button type="button" id="enabled-btn" class="btn-icon icon-selected"><aside>Enable</aside></button>
                <button type="button" id="disabled-btn" class="btn-icon"><aside>Disable</aside></button>
                <button type="button" id="outside-btn" class="btn-icon"><aside>Outside</aside></button>
            </aside>
        </form>

        <div hidden id="map-container" class="">
            <div id="top-map-bar" class="game-bar">
                <div class="input-label">
                    <input type="checkbox" id="show-outline">
                    <label for="show-outline">Show Outline</label>
                </div>
                <div class="dotted-line"></div>
            </div>
            
            <svg viewBox="0 0 1600 900" preserveAspectRatio="none" id="templateMap" class="container-1">
                <rect id="map-outline"></rect>
            </svg>
        </div>
        
        <div id="selected-list" class="form-1"></div>
    </main>

    <div id="loading-screen">CREATING MAP . . .</div>

    <!-- Templates -->

    <!-- SVG-g template ( it is necessary to copy g elements from inside an svg instead of creating new
         elements in a js file, since the HTML will not recognize the element ) -->
    <template id="svg-g-template">
        <svg><g></g></svg>
    </template>

    <!-- SVG-Path template ( it is necessary to copy path elements from inside an svg instead of creating new
         elements in a js file, since the HTML will not recognize the element ) -->
    <template id="svg-path-template">
        <svg><path></path></svg>
    </template>

</body>
</html>
