<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Panel</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="css/all.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/admin.css" />

    <script src="js/admin.js" type="module"></script>
    <script src="js/components/header.js"></script>
</head>
<body>
    <app-header></app-header>
    <main class="flex-col-center gap-5">
        <div id="main-area" class="container-2">
            <form enctype="multipart/form-data" id="upload-file-form" class="flex-row-center gap-5">
                <div class="input-label">
                    <label for="map-thumbnail">File upload</label>
                    <input type="file" accept=".geojson" name="mapfile" id="data-input">
                </div>
                <button type="submit" id="upload-btn" class="btn-grey">Upload</button>
            </form>
            <div>
                <pre id="file-stream"></pre>
            </div>
        </div>
    </main>
</body>
</html>
